services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: artlas
      POSTGRES_PASSWORD: artlas
      POSTGRES_DB: artlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artlas -d artlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: artlas
      POSTGRES_PASSWORD: artlas
      POSTGRES_DB: artlas
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-env-file-openssl-rand-hex-32}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
